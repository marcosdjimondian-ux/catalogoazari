  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

tter-spacing:.06em;color:#d9b26a;white-space:nowrap\">{{ b.count }} etiquetas<\u002Fspan><\u002Fspan>\n        <div style=\"flex:none;display:grid;grid-template-columns:repeat(4,76px);gap:4px;font-family:'Archivo Narrow',sans-serif;font-size:10px;font-weight:800;letter-spacing:.02em;text-align:right;color:#f6d4da;text-transform:uppercase\">\n          <span>Efectivo<\u002Fspan><span>Transfer.<\u002Fspan><span>1 Pago<\u002Fspan><span>3 Pagos<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #e3dfe9;border-top:none;border-radius:0 0 6px 6px;overflow:hidden\">\n        <sc-for list=\"{{ b.items }}\" as=\"it\" hint-placeholder-count=\"6\">\n          <div style=\"{{ it.rowStyle }}\">\n            <div style=\"flex:1 1 210px;min-width:170px;display:flex;align-items:center;gap:8px\">\n              <span style=\"flex:none;min-width:28px;height:18px;padding:0 5px;border-radius:5px;background:#f4ead2;color:#1e1e24;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'Archivo Narrow',sans-serif\">{{ it.uLabel }}<\u002Fspan>\n              <span style=\"min-width:0;font-weight:600;font-size:12px;color:#1c1922;line-height:1.1\">{{ it.n }}<sc-if value=\"{{ it.hasTag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:6px;font-size:8px;font-weight:800;letter-spacing:.05em;color:#1e1e24;background:#f4ead2;padding:1px 5px;border-radius:4px;text-transform:uppercase;vertical-align:middle\">{{ it.tag }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ it.noStock }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:6px;font-size:8px;font-weight:800;letter-spacing:.05em;color:#a3283b;background:#fae8ec;padding:1px 5px;border-radius:4px;vertical-align:middle\">SIN STOCK<\u002Fspan><\u002Fsc-if><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:none;display:grid;grid-template-columns:repeat(4,76px);gap:4px\">\n              <div style=\"background:#dcecdf;border-radius:5px;padding:2px 7px;font-size:12.5px;font-weight:800;color:#2f6b41;text-align:right;white-space:nowrap\">{{ it.efvoF }}<\u002Fdiv>\n              <div style=\"background:#e7e4ec;border-radius:5px;padding:2px 7px;font-size:12.5px;font-weight:800;color:#4a4551;text-align:right;white-space:nowrap\">{{ it.transfF }}<\u002Fdiv>\n              <div style=\"background:#dde8f8;border-radius:5px;padding:2px 7px;font-size:12.5px;font-weight:800;color:#2f5691;text-align:right;white-space:nowrap\">{{ it.pago1F }}<\u002Fdiv>\n              <div style=\"background:#e8e0f4;border-radius:5px;padding:2px 7px;font-size:12.5px;font-weight:800;color:#6a4a97;text-align:right;white-space:nowrap\">{{ it.pago3F }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  // === Google Sheet en vivo (solapa \"lista actualizada\") ===\n  // Estructura por columna: 0 nombre · 1 unidades · 2 efectivo · 3 transferencia ·\n  // 4 un pago · 5 tres pagos · 6 disponibilidad (👍🏼 / NO STOCK) · 7 nota.\n  // Las filas de combo van arriba; luego cada encabezado de bodega abre su sección.\n  SHEET_ID = '1vh5mQXsfvrmPhHNadaPXs-wu2zBY809SDfs0woNrmu4';\n  SHEET_NAME = 'lista actualizada';\n  state = {};\n  componentDidMount(){\n    if(!window.AZARI_DATA){\n      this._iv = setInterval(()=>{ if(window.AZARI_DATA){ clearInterval(this._iv); this.forceUpdate(); } }, 60);\n    }\n    this.loadSheet();\n  }\n  componentWillUnmount(){ if(this._iv) clearInterval(this._iv); }\n  async loadSheet(){\n    const url = 'https://docs.google.com/spreadsheets/d/'+this.SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(this.SHEET_NAME)+'&_='+Date.now();\n    try{\n      const r = await fetch(url);\n      if(!r.ok) return;\n      const built = this.buildData(this.parseCSV(await r.text()));\n      if(built && built.bodegas && built.bodegas.length){\n        this.setState({ liveBodegas: built.bodegas, liveCombos: built.combos });\n      }\n    }catch(e){ /* mantiene datos locales */ }\n  }\n  parseCSV(text){\n    const rows=[]; let i=0,f='',row=[],q=false;\n    while(i<text.length){\n      const c=text[i];\n      if(q){\n        if(c==='\"'){ if(text[i+1]==='\"'){f+='\"';i+=2;continue;} q=false;i++;continue; }\n        f+=c;i++;continue;\n      }\n      if(c==='\"'){q=true;i++;continue;}\n      if(c===','){row.push(f);f='';i++;continue;}\n      if(c==='\\n'){row.push(f);rows.push(row);row=[];f='';i++;continue;}\n      if(c==='\\r'){i++;continue;}\n      f+=c;i++;\n    }\n    if(f.length||row.length){row.push(f);rows.push(row);}\n    return rows;\n  }\n  num(v){\n    let s = String(v==null?'':v).trim();\n    if(!s) return null;\n    s = s.replace(/[^\\d.,]/g,'');\n    if(s.indexOf(',')>=0) s = s.split(',')[0]; // decimales AR → descartar centavos\n    s = s.replace(/\\./g,'');                    // puntos = miles\n    const n = parseInt(s,10);\n    return isNaN(n)?null:n;\n  }\n  cleanName(s){ return String(s||'').replace(/🍷/g,'').replace(/\\s+/g,' ').trim(); }\n  titleCase(s){\n    const small = {de:1,del:1,la:1,las:1,los:1,y:1,e:1,con:1,sin:1};\n    return this.cleanName(s).toLowerCase().split(' ').map((w,i)=>{\n      if(!w) return w;\n      if(i>0 && small[w]) return w;\n      // capitaliza la primera letra (respetando paréntesis, ej. \"(patagonia)\")\n      return w.replace(/^([^a-záéíóúñ]*)([a-záéíóúñ])/i, (m,p,c)=>p+c.toUpperCase());\n    }).join(' ');\n  }\n  inStock(v){ return !/no\\s*stock/i.test(String(v||'')); }\n  comboGroup(name){\n    if(/^azari\\s+signature/i.test(name)) return 'Azari Signature';\n    if(/^combo\\s+essential/i.test(name)) return 'Combos Essentials';\n    return 'Cajas Recomendadas';\n  }\n  buildData(rows){\n    if(!rows||!rows.length) return null;\n    const combos=[], bodegas=[];\n    let cur=null, inBodegas=false;\n    // primer encabezado de bodega: contiene 🍷 o la palabra \"bodega\"\n    const isBodegaHeader = name => /🍷/.test(name) || /\\bbodega\\b/i.test(name);\n    for(let r=0;r<rows.length;r++){\n      const row=rows[r]; if(!row) continue;\n      const rawName=(row[0]||'').trim();\n      if(!rawName) continue;\n      const name=this.cleanName(rawName);\n      const efvo=this.num(row[2]);\n      const isHeader = (efvo==null);\n      if(isHeader){\n        if(!inBodegas && isBodegaHeader(rawName)) inBodegas=true;\n        if(inBodegas){\n          if(isBodegaHeader(rawName) || /nuevos ingresos/i.test(rawName) || cur){\n            cur={ name, items:[] };\n            bodegas.push(cur);\n          }\n        }\n        continue; // encabezados de combo (\"CAJAS RECOMENDADAS\") se ignoran; el grupo sale del nombre\n      }\n      // fila con precio\n      const it={\n        n: name,\n        u: this.num(row[1])||1,\n        tag: (row[7]||'').trim(),\n        efvo: efvo,\n        transf: this.num(row[3]),\n        pago1: this.num(row[4]),\n        pago3: this.num(row[5]),\n        stock: this.inStock(row[6])\n      };\n      if(!inBodegas){\n        // región de combos (antes de la primera bodega)\n        const colon = name.indexOf(':');\n        const cName = colon>0 ? name.slice(0,colon).trim() : name;\n        const cDesc = colon>0 ? name.slice(colon+1).trim() : '';\n        combos.push({ group:this.comboGroup(name), name:cName, desc:cDesc,\n          efvo:it.efvo, transf:it.transf, pago1:it.pago1, pago3:it.pago3, stock:it.stock });\n      } else {\n        if(!cur){ cur={ name:'Otros', items:[] }; bodegas.push(cur); }\n        cur.items.push(it);\n      }\n    }\n    return { combos, bodegas };\n  }\n  fmt(n){ return (n==null||isNaN(n)) ? '' : '$'+Number(n).toLocaleString('es-AR'); }\n  renderVals(){\n    const base = window.AZARI_DATA || { combos:[], bodegas:[] };\n    const live = this.state && this.state.liveBodegas;\n    const liveOn = !!(live && live.length);\n    const D = {\n      combos: (liveOn && this.state.liveCombos && this.state.liveCombos.length) ? this.state.liveCombos : (base.combos || []),\n      bodegas: liveOn ? live : (base.bodegas || []),\n      updated: base.updated\n    };\n    const rowBase = 'display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:4px 12px;padding:1px 10px;border-bottom:1px solid #ece9f1;line-height:1.05;';\n    const bodegas = (D.bodegas||[]).map((b,i)=>{\n      const id = 'bod-'+i;\n      const items = (b.items||[]).map((it,ri)=>{\n        const dim = !it.stock;\n        // alternating band so each product name reads as its own unit\n        const bg = dim ? '#fbe4e8' : ((ri % 2 === 0) ? '#ffffff' : '#f7f5fb');\n        return {\n          n: it.n,\n          uLabel: '×'+it.u,\n          tag: it.tag || '',\n          hasTag: !!it.tag,\n          noStock: dim,\n          efvoF: this.fmt(it.efvo),\n          transfF: this.fmt(it.transf),\n          pago1F: this.fmt(it.pago1),\n          pago3F: this.fmt(it.pago3),\n          rowStyle: rowBase + 'background:' + bg + (dim ? ';box-shadow:inset 3px 0 0 #d13a4e' : '')\n        };\n      });\n      return { name: (b.name||'').toUpperCase(), indexName: this.titleCase(b.name), id, href:'#'+id, count: items.length, items };\n    });\n    const cardBase = 'position:relative;border:1px solid #e3dfe9;border-radius:11px;padding:11px 12px 10px;background:#fff;box-shadow:0 2px 8px rgba(28,25,34,.04);break-inside:avoid;overflow:hidden';\n    const combos = (D.combos||[]).map(c=>({\n      group: c.group, name: c.name, desc: c.desc, dim: !c.stock,\n      efvoF: this.fmt(c.efvo), transfF: this.fmt(c.transf), pago1F: this.fmt(c.pago1), pago3F: this.fmt(c.pago3),\n      cardStyle: c.stock ? cardBase : (cardBase + ';opacity:.62')\n    }));\n    const comboGroups = [];\n    const gIndex = {};\n    combos.forEach(c=>{\n      if(gIndex[c.group]===undefined){ gIndex[c.group]=comboGroups.length; comboGroups.push({ title:c.group, cards:[] }); }\n      comboGroups[gIndex[c.group]].cards.push(c);\n    });\n    comboGroups.forEach(g=>{ g.count = g.cards.length; });\n    return { bodegas, comboGroups, updated: D.updated || '' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
